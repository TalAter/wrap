name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  GH_TOKEN: ${{ github.token }}
  GH_REPO: ${{ github.repository }}

jobs:
  create-release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches package.json version
        run: |
          pkg_version="$(jq -r .version package.json)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $pkg_version"
            exit 1
          fi

      # Idempotent: re-running the workflow after a partial failure must
      # not die on "release already exists".
      - name: Create draft release
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" \
                 --draft \
                 --title "$GITHUB_REF_NAME" \
                 --notes "Release $GITHUB_REF_NAME"

  # Static analysis on the install scripts. Gates `build` and `install-asset`
  # so a shellcheck failure prevents any asset from shipping to the release.
  shellcheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt-get install -y -qq shellcheck
      - name: Run shellcheck
        run: shellcheck scripts/install.sh scripts/test-install.sh scripts/install-assert.sh

  build:
    needs: [create-release, shellcheck]
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: aarch64-apple-darwin
            bun_target: bun-darwin-arm64
            runner: macos-14
            os: macos
          - triple: x86_64-apple-darwin
            bun_target: bun-darwin-x64
            runner: macos-15-intel
            os: macos
          - triple: aarch64-unknown-linux-gnu
            bun_target: bun-linux-arm64
            runner: ubuntu-24.04-arm
            os: linux
          - triple: x86_64-unknown-linux-gnu
            bun_target: bun-linux-x64
            runner: ubuntu-24.04
            os: linux
          - triple: aarch64-unknown-linux-musl
            bun_target: bun-linux-arm64-musl
            runner: ubuntu-24.04-arm
            os: linux
          - triple: x86_64-unknown-linux-musl
            bun_target: bun-linux-x64-musl
            runner: ubuntu-24.04
            os: linux
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.bun-version', 'bun.lock') }}
          restore-keys: bun-${{ runner.os }}-${{ runner.arch }}-

      - run: bun install --frozen-lockfile

      # BUN_NO_CODESIGN_MACHO_BINARY=1 skip Bun's post-compile self-sign on macOS.
      # Strip below would invalidate it anyway, then we re-sign ad-hoc.
      - name: Build
        env:
          BUN_NO_CODESIGN_MACHO_BINARY: "1"
          WRAP_BUILD_TARGET: ${{ matrix.bun_target }}
        run: bun run build

      # Strip before signing — strip invalidates signatures.
      # Linux binaries are NOT stripped: GNU strip discards the trailer
      # Bun appends past the ELF image, leaving a binary that boots as
      # bare bun instead of running the embedded entrypoint.
      - name: Strip (macOS)
        if: matrix.os == 'macos'
        run: strip -x wrap

      - name: Ad-hoc sign (macOS)
        if: matrix.os == 'macos'
        run: codesign --sign - --force ./wrap

      - name: Tar
        env:
          TRIPLE: ${{ matrix.triple }}
        run: tar -czf "wrap-${TRIPLE}.tar.gz" wrap

      # Upload before attest so a Sigstore outage can't block the asset from
      # reaching the draft release. Attestation sha256 is fixed at tar time.
      - name: Upload to draft release
        env:
          TRIPLE: ${{ matrix.triple }}
        run: gh release upload "$GITHUB_REF_NAME" "wrap-${TRIPLE}.tar.gz" --clobber

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: wrap-${{ matrix.triple }}.tar.gz

  # Single checksums.txt for all tarballs. install.sh greps the line for its
  # triple and pipes to `shasum -a 256 -c -` (GoReleaser-style format).
  checksums:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download tarballs from draft release
        run: gh release download "$GITHUB_REF_NAME" --pattern 'wrap-*.tar.gz' --dir dist

      - name: Compute checksums
        working-directory: dist
        run: sha256sum wrap-*.tar.gz > checksums.txt

      - name: Upload checksums to draft release
        run: gh release upload "$GITHUB_REF_NAME" dist/checksums.txt --clobber

      - name: Attest checksums
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/checksums.txt

  # Upload scripts/install.sh as a release asset, byte-identical to the repo
  # file. wrap.talater.com/install.sh redirects to releases/latest/download/...
  install-asset:
    needs: [create-release, shellcheck]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
      - name: Upload install.sh to draft release
        run: gh release upload "$GITHUB_REF_NAME" scripts/install.sh --clobber
      - name: Attest install.sh
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: scripts/install.sh

  # End-to-end verify: install / re-run / uninstall against the just-uploaded
  # draft assets, in libc/OS combinations not covered by the maintainer's Mac.
  # Failure leaves the release in draft.
  verify-install-linux:
    needs: [checksums, install-asset]
    strategy:
      fail-fast: false
      matrix:
        include:
          - leg: glibc
            image: ubuntu:24.04
          - leg: musl
            image: alpine:3.20
    runs-on: ubuntu-24.04
    container: ${{ matrix.image }}
    steps:
      - name: Install prereqs (apt)
        if: matrix.leg == 'glibc'
        run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y -qq curl python3 ca-certificates tar

      - name: Install prereqs (apk)
        if: matrix.leg == 'musl'
        # Stock alpine has no bash, so Actions' default `bash {0}` shell
        # would fail before the step runs. Force sh for this bootstrap step,
        # then install bash so later steps use the default.
        shell: sh -e {0}
        run: apk add --no-cache curl python3 ca-certificates tar bash

      # gh CLI is not preinstalled in stock distro images. Use the static Go
      # build from gh's own releases — works on glibc and musl.
      # Bump V manually when refreshing the pin.
      - name: Install gh CLI
        run: |
          ARCH="$(uname -m | sed 's/x86_64/amd64/; s/aarch64/arm64/')"
          V=2.62.0
          curl -fsSL "https://github.com/cli/cli/releases/download/v${V}/gh_${V}_linux_${ARCH}.tar.gz" | tar -xz -C /tmp
          install "/tmp/gh_${V}_linux_${ARCH}/bin/gh" /usr/local/bin/gh

      # No actions/checkout in container: alpine + injected-node compat is
      # fragile. Fetch install-assert.sh from raw github content (the repo
      # is public; the tag exists at workflow-trigger time).
      - name: Download install-assert.sh and draft release assets
        run: |
          mkdir -p /tmp/r
          curl -fsSL "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}/scripts/install-assert.sh" \
            -o /tmp/install-assert.sh
          gh release download "$GITHUB_REF_NAME" -D /tmp/r

      - name: Serve assets locally + run assertion checklist
        run: |
          cd /tmp/r
          python3 -m http.server 8000 >/dev/null 2>&1 &
          trap "kill $! 2>/dev/null || true" EXIT
          for _ in $(seq 1 40); do
            curl -fsS http://127.0.0.1:8000/install.sh >/dev/null 2>&1 && break
            sleep 0.1
          done
          BASE_URL=http://127.0.0.1:8000 \
            INSTALL_SCRIPT=/tmp/r/install.sh \
            EXPECTED_VERSION="${GITHUB_REF_NAME#v}" \
            sh /tmp/install-assert.sh

  verify-install-macos:
    needs: [checksums, install-asset]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Download draft release assets
        run: gh release download "$GITHUB_REF_NAME" -D /tmp/r

      - name: Serve assets locally + run assertion checklist
        run: |
          cd /tmp/r
          python3 -m http.server 8000 >/dev/null 2>&1 &
          trap "kill $! 2>/dev/null || true" EXIT
          for _ in $(seq 1 40); do
            curl -fsS http://127.0.0.1:8000/install.sh >/dev/null 2>&1 && break
            sleep 0.1
          done
          BASE_URL=http://127.0.0.1:8000 \
            INSTALL_SCRIPT=/tmp/r/install.sh \
            EXPECTED_VERSION="${GITHUB_REF_NAME#v}" \
            sh "$GITHUB_WORKSPACE/scripts/install-assert.sh"

  publish-release:
    needs: [verify-install-linux, verify-install-macos]
    runs-on: ubuntu-24.04
    steps:
      - name: Publish release
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --prerelease=${{ contains(github.ref_name, '-') }}

  bump-tap:
    needs: publish-release
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Bump tap formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: bun run scripts/bump-tap.ts
